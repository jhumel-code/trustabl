name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install C toolchain (tree-sitter requires CGO)
        run: sudo apt-get install -y gcc

      - name: vet
        run: go vet ./...

      - name: test
        run: CGO_ENABLED=1 go test -race ./...
        env:
          CGO_ENABLED: "1"

      - name: build
        run: CGO_ENABLED=1 go build ./cmd/trustabl
        env:
          CGO_ENABLED: "1"
