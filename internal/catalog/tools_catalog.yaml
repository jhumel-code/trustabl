version: "1"
# Curated seed catalog. Generated by tools/gather_tools.py + human curation.
# Each entry maps a canonical tool ID and its aliases to a capability class.
# capability_class values: code_execution | shell_execution | file_read |
#   file_write | network_read | network_write | agent_spawn | memory_write |
#   data_query | data_mutate | auth_action | computer_use | external_api
entries:

  # ── Code execution ─────────────────────────────────────────────────────────
  - id: code_interpreter
    aliases:
      - run_code
      - execute_code
      - python_repl
      - exec_code
      - code_runner
      - run_python
      - eval_code
      - execute_python
      - code_execution
      - code_exec
      - repl
      - python_executor
      - run_script
      - execute_script
    frameworks: [openai_agents, anthropic_claude, langchain, autogen]
    capability_class: code_execution
    risk_level: critical
    description: Executes arbitrary code or runs a REPL

  # ── Shell execution ────────────────────────────────────────────────────────
  - id: shell_tool
    aliases:
      - run_shell
      - execute_command
      - run_terminal
      - bash_tool
      - shell_exec
      - run_bash
      - terminal
      - execute_bash
      - run_command
      - execute_shell
      - shell_command
      - bash_command
      - cmd_exec
      - system_call
      - subprocess_tool
    frameworks: [langchain, crewai, autogen, openai_agents]
    capability_class: shell_execution
    risk_level: critical
    description: Runs arbitrary shell or terminal commands

  # ── File write ─────────────────────────────────────────────────────────────
  - id: file_writer
    aliases:
      - write_file
      - create_file
      - save_file
      - append_file
      - write_to_file
      - create_document
      - overwrite_file
      - delete_file
      - remove_file
      - move_file
      - file_write
      - save_document
      - write_text
      - write_content
      - create_text_file
    frameworks: [langchain, crewai, openai_agents, anthropic_claude, autogen, pydantic_ai]
    capability_class: file_write
    risk_level: high
    description: Creates, writes, or deletes files on disk

  # ── File read ──────────────────────────────────────────────────────────────
  - id: file_reader
    aliases:
      - read_file
      - load_file
      - open_file
      - get_file_content
      - read_document
      - read_text_file
      - file_read
      - get_file
      - load_document
      - read_text
      - read_content
    frameworks: [langchain, crewai, openai_agents, anthropic_claude, autogen, pydantic_ai]
    capability_class: file_read
    risk_level: medium
    description: Reads files from disk

  # ── Network read ───────────────────────────────────────────────────────────
  - id: web_search
    aliases:
      - search_web
      - google_search
      - bing_search
      - search_internet
      - search
      - web_search_tool
      - tavily_search
      - serp_search
      - search_query
      - internet_search
      - duckduckgo_search
      - brave_search
      - search_online
    frameworks: [openai_agents, langchain, crewai, autogen, pydantic_ai, google_adk]
    capability_class: network_read
    risk_level: medium
    description: Searches the web for information

  - id: web_fetch
    aliases:
      - fetch_url
      - open_url
      - browse_web
      - get_webpage
      - scrape_page
      - http_get
      - fetch_page
      - visit_url
      - get_url
      - fetch_content
      - load_url
      - web_scrape
    frameworks: [langchain, crewai, openai_agents, anthropic_claude]
    capability_class: network_read
    risk_level: medium
    description: Fetches content from a URL

  # ── Network write ──────────────────────────────────────────────────────────
  - id: http_post
    aliases:
      - http_request
      - api_call
      - make_request
      - post_request
      - api_request
      - call_api
      - http_post
      - webhook_send
      - send_request
      - post_data
    frameworks: [langchain, crewai, openai_agents]
    capability_class: network_write
    risk_level: high
    description: Makes mutating HTTP requests to external services

  # ── Agent spawn ────────────────────────────────────────────────────────────
  - id: agent_spawner
    aliases:
      - spawn_agent
      - create_agent
      - delegate_task
      - invoke_agent
      - call_subagent
      - run_agent
      - start_agent
      - launch_agent
      - transfer_to_agent
      - hand_off
      - handoff
      - delegate_to_agent
      - create_subagent
    frameworks: [openai_agents, autogen, crewai, langchain, anthropic_claude]
    capability_class: agent_spawn
    risk_level: high
    description: Spawns or delegates to a subagent

  # ── Memory write ───────────────────────────────────────────────────────────
  - id: memory_writer
    aliases:
      - save_memory
      - store_memory
      - update_memory
      - remember
      - add_memory
      - write_memory
      - memorize
      - upsert_memory
      - memory_save
      - add_to_memory
      - store_fact
      - save_fact
    frameworks: [openai_agents, langchain, autogen, pydantic_ai]
    capability_class: memory_write
    risk_level: medium
    description: Writes to long-term memory or vector store

  # ── Data query ─────────────────────────────────────────────────────────────
  - id: sql_query
    aliases:
      - query_database
      - sql_query
      - execute_query
      - run_sql
      - db_query
      - database_query
      - query_db
      - select_query
      - run_query
      - db_read
    frameworks: [langchain, crewai, autogen, openai_agents]
    capability_class: data_query
    risk_level: medium
    description: Reads from a database via SQL or similar

  # ── Data mutate ────────────────────────────────────────────────────────────
  - id: sql_mutate
    aliases:
      - update_database
      - insert_record
      - delete_record
      - run_sql_write
      - db_write
      - execute_sql
      - modify_database
      - db_update
      - db_insert
      - db_delete
      - write_database
    frameworks: [langchain, crewai, openai_agents]
    capability_class: data_mutate
    risk_level: high
    description: Writes to a database

  # ── Auth ───────────────────────────────────────────────────────────────────
  - id: auth_tool
    aliases:
      - login
      - authenticate
      - get_token
      - oauth_flow
      - sign_in
      - get_credentials
      - fetch_token
      - acquire_token
      - auth_user
      - get_api_key
      - refresh_token
    frameworks: [langchain, openai_agents, autogen]
    capability_class: auth_action
    risk_level: high
    description: Handles authentication, credentials, or token acquisition

  # ── Computer use ───────────────────────────────────────────────────────────
  - id: computer_use
    aliases:
      - click
      - type_text
      - screenshot
      - browser_action
      - computer_action
      - mouse_click
      - keyboard_type
      - take_screenshot
      - open_browser
      - browser_click
      - browser_type
      - move_mouse
      - scroll_page
      - key_press
    frameworks: [anthropic_claude, openai_agents]
    capability_class: computer_use
    risk_level: critical
    description: Controls desktop GUI or browser directly

  # ── External API — messaging ────────────────────────────────────────────────
  - id: send_email
    aliases:
      - send_email
      - email_send
      - compose_email
      - send_mail
      - send_email_message
    frameworks: [openai_agents, langchain, crewai]
    capability_class: external_api
    risk_level: high
    description: Sends email via an external service

  - id: send_slack
    aliases:
      - send_slack
      - slack_message
      - post_slack
      - slack_send
      - notify_slack
      - slack_post
    frameworks: [openai_agents, langchain]
    capability_class: external_api
    risk_level: high
    description: Posts messages to Slack

  - id: send_sms
    aliases:
      - send_sms
      - send_text
      - sms_send
      - twilio_send
    frameworks: [openai_agents, langchain]
    capability_class: external_api
    risk_level: high
    description: Sends SMS messages

  # ── External API — version control ─────────────────────────────────────────
  - id: github_action
    aliases:
      - create_issue
      - create_pr
      - merge_pr
      - close_issue
      - github_api
      - create_pull_request
      - open_issue
      - close_pr
    frameworks: [openai_agents, langchain, crewai]
    capability_class: external_api
    risk_level: high
    description: Mutates GitHub resources

  # ── External API — payments ────────────────────────────────────────────────
  - id: stripe_charge
    aliases:
      - charge_card
      - create_charge
      - process_payment
      - refund_payment
      - stripe_api
    frameworks: [openai_agents, langchain]
    capability_class: external_api
    risk_level: critical
    description: Processes payments via Stripe or similar

  # ── External API — calendar / scheduling ──────────────────────────────────
  - id: calendar_write
    aliases:
      - create_event
      - schedule_meeting
      - add_calendar_event
      - book_meeting
      - calendar_create
    frameworks: [openai_agents, langchain, google_adk]
    capability_class: external_api
    risk_level: medium
    description: Creates or modifies calendar events
