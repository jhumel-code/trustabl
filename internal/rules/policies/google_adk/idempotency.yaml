policy:
  id: google_adk_idempotency
  name: Google ADK mutating-tool idempotency
  category: google_adk
  description: >
    Rules that flag mutating tools (create/send/refund/...) without an
    idempotency key. ADK agents retry tool calls under timeouts and
    ambiguous failures; without a key the same side-effecting action can
    fire twice.

rules:
  - id: GADK-006
    title: Mutating tool has no idempotency key
    scope: tool
    severity: medium
    confidence: 0.55
    language: python
    applies_to:
      - google_adk_tool
    match:
      all:
        - name_has_prefix:
            - create_
            - send_
            - delete_
            - post_
            - update_
            - refund_
            - charge_
            - issue_
        - not:
            param_name_matches:
              contains:
                - idempot
              exact:
                - request_id
                - txn_id
    explanation: >
      Tool name suggests a side effect (create/send/refund/…). ADK agents
      retry tool calls under timeouts and ambiguous failures; without an
      idempotency key the same action can fire twice. The hook generator
      can stamp a key into the request, but the downstream service must
      honor it.
    fix: >
      Add an `idempotency_key: str` parameter; verify the receiving API
      respects it.
    fix_type: code
    fix_hints:
      hook: pretooluse_validate
      inject_idempotency: true
